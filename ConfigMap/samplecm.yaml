apiVersion: v1
kind: ConfigMap
metadata:
  name: game-demo
# this config map has 4 keys which are in a key value pair.
# the first two keys have a single string value, the last two keys have multiple strings values
data:
  # property-like keys; each key maps to a simple value
  player_initial_lives: "3"
  ui_properties_file_name: "user-interface.properties"

  # file-like keys
  game.properties: |
    enemy.types=aliens,monsters
    player.maximum-lives=5
  user-interface.properties: |
    color.good=purple
    color.bad=yellow
    allow.textmode=true
~
